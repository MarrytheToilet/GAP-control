# Multi-attribute composition demo (handbook 3.8): soft x hard fusion.
# control = positive sentiment AND formal style AND short length AND contains "ocean".
# Joint reward via weighted mixture; eval reports joint success.
task: multiattr_demo

control:
  - {dim: sentiment, value: positive, alpha: 1.0}
  - {dim: style,     value: formal,   alpha: 1.0}
  - {dim: length,    value: short,    alpha: 1.0}
  - {dim: keyword,   alpha: 1.0, keywords: ["ocean"]}
aggregate: mean       # use "min" for harsh joint objective
conflict_mu: 0.0

base_model: Qwen3-4B
backbone: bge-base-en-v1.5
classifier_dir: models/classifier
language: en
device: cuda
dtype: float16

soft_reward_backend: classifier
reward_judge_model: Qwen/Qwen2.5-0.5B-Instruct

num_prompts: 20
prefixes_per_prompt: 8
prefix_min_len: 3
prefix_max_len: 25
prefix_gen_max_new: 30

teacher: rollout
topk: 50
rollout_samples: 4
rollout_max_new: 20
rollout_temperature: 1.0
rollout_batch_size: 256

control_dim: 64
fuse_hidden: 512
controller_dropout: 0.1

tau: 1.0
value_lambda: 1.0
lr: 1.0e-4
epochs: 20
batch_size: 64
grad_clip: 1.0
val_frac: 0.1
seed: 0

projection: l2
rho_min: 0.0
rho_max: 2.0
reward_target: 1.0
kl_budget_max: 1.0

gen_max_new: 40
gen_top_p: 0.9
gen_temperature: 0.7
decode_topk: 50
samples_per_prompt: 1
