# Dynamic-control demo: hard keyword constraint (fully offline, exact verifier, no API).
# Best illustration of the closed loop: residual pushes toward the keyword while unsatisfied,
# then collapses to ~0 once the word appears (observed-satisfaction clamp).
task: keyword_demo

control:
  - {dim: keyword, alpha: 1.0, keywords: ["ocean"]}
aggregate: mean
conflict_mu: 0.0

base_model: Qwen/Qwen2.5-0.5B-Instruct
backbone: bge-base-en-v1.5
classifier_dir: models/classifier
language: en
device: cuda
dtype: float16

soft_reward_backend: llm_judge
reward_judge_model: Qwen/Qwen2.5-0.5B-Instruct

num_prompts: 8
prefixes_per_prompt: 4
prefix_min_len: 3
prefix_max_len: 16
prefix_gen_max_new: 20

teacher: rollout
topk: 32
rollout_samples: 3
rollout_max_new: 24
rollout_temperature: 1.0
rollout_batch_size: 96

control_dim: 64
fuse_hidden: 256
controller_dropout: 0.1

tau: 1.0
value_lambda: 1.0
lr: 2.0e-4
epochs: 15
batch_size: 16
grad_clip: 1.0
val_frac: 0.2
seed: 0

projection: l2
rho_min: 0.1
rho_max: 4.0
reward_target: 1.0
kl_budget_max: 1.0

gen_max_new: 30
gen_top_p: 0.9
gen_temperature: 0.7
decode_topk: 32
samples_per_prompt: 1
lexical_strength: 8.0
